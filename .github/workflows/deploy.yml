name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Opt into Node 24 for JavaScript actions ahead of the June 2 2026
# forced migration. Lets existing @v4/@v3 actions run on the new
# runtime today so we catch breakage early instead of on deadline day.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from the "packageManager" field in package.json —
      # do NOT pass a `version:` here, action-setup@v4 errors on dual-source.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'
          GATSBY_CF_BEACON_TOKEN: ${{ secrets.GATSBY_CF_BEACON_TOKEN }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # Tests are advisory on push-to-main — failures surface as a red
      # check on the commit but do not gate the deploy. Trust comes from
      # the typecheck gate in pre-commit + the green build above; smoke
      # tests are a belt-and-suspenders against rendering regressions,
      # not a release blocker. On pull_request they still gate review.
      - name: Smoke + a11y tests
        id: smoke
        continue-on-error: ${{ github.event_name == 'push' }}
        run: pnpm exec playwright test
        env:
          PORT: 9000

      - name: Upload Playwright report on failure
        if: always() && steps.smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Deploy → Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=rox-one --branch=production --commit-dirty=true
